
services:
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
  client:
    build: ./frontend/client
    container_name: client
    ports:
      - "3000:80"
    depends_on:
      - backend
  admin:
    build: ./frontend/admin
    container_name: admin
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mongo-data:
